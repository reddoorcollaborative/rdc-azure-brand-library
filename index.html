<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Microsoft Azure — Brand Library · Red Door Collaborative</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --az-blue:#0078d4;--energy:#0000b3;--deep:#000085;--navy:#0d0061;
  --electric:#1a00e2;--indigo:#5d52ec;--sky:#00ffff;--teal:#00bbc3;
  --lavender:#aac0fc;--mint:#cff3e8;--plum:#590055;--fuchsia:#d12aca;
  --lgreen:#d4ec8e;--lgray:#d9d9d6;--white:#ffffff;
  --bg:#f4f6f9;--surface:#fff;--text:#111827;--muted:#4b5563;--border:#e5e7eb;
  --nav:260px;--r:12px;--rl:20px;
}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;display:flex}

nav{position:fixed;top:0;left:0;width:var(--nav);height:100vh;background:var(--navy);overflow-y:auto;display:flex;flex-direction:column;z-index:100;padding-bottom:2rem}
.nav-brand{padding:1.75rem 1.5rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.1)}
.nav-brand .ey{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:.3rem}
.nav-brand .ti{font-size:1rem;font-weight:600;color:#fff}
.nav-brand .su{font-size:.72rem;color:rgba(255,255,255,.35);margin-top:.15rem}
.nlabel{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:1.1rem 1.5rem .35rem}
nav a{display:block;padding:.5rem 1.5rem;font-size:.8rem;color:rgba(255,255,255,.6);text-decoration:none;transition:all .15s;border-left:2px solid transparent}
nav a:hover{color:#fff;background:rgba(255,255,255,.06);border-left-color:var(--az-blue)}
nav a.active{color:#fff;background:rgba(0,120,212,.2);border-left-color:var(--az-blue)}

main{margin-left:var(--nav);flex:1;min-width:0}
section{padding:3.5rem 4rem;border-bottom:1px solid var(--border)}
section:last-child{border-bottom:none}
.ey2{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--az-blue);margin-bottom:.5rem;font-weight:600}
h2{font-size:1.75rem;font-weight:600;margin-bottom:.4rem}
.intro{font-size:.95rem;color:var(--muted);max-width:680px;margin-bottom:2rem;line-height:1.7}
.divider{border:none;border-top:1px solid var(--border);margin:2rem 0}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:1.5rem}
.card-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.65rem}
.card p{font-size:.875rem;color:var(--muted);line-height:1.65}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
</style>
</head>
<body>
<p>Placeholder — full content push via MCP</p>
</body>
</html>
